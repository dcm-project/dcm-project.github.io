      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyContribution'
      responses:
        '200':
          description: Operation initiated. Poll `operation.name` for completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
  /api/v1/contribute/resource-group:
    post:
      tags:
