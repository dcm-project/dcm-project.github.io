            application/json:
              schema:
                $ref: '#/components/schemas/CredentialValue'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/credentials/{credential_uuid}:rotate:
    post:
      tags:
      - credentials
      operationId: rotateCredential
      summary: Initiate credential rotation
      parameters:
      - name: credential_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Operation initiated. Poll `operation.name` for completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Session token obtained from POST /api/v1/auth/token
  parameters:
    entity_uuid:
      name: entity_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the resource entity
    request_uuid:
      name: request_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    catalog_item_uuid:
      name: catalog_item_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    group_uuid:
      name: group_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    session_uuid:
      name: session_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limit:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
    cursor:
      name: page_token
      in: query
      schema:
        type: string
      description: Opaque page token from previous response (use next_page_token from
        response)
  responses:
    BadRequest:
      description: Invalid request syntax
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not authorized. rule_uuid identifies the governing
        policy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found or not visible to authenticated actor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Request syntax valid but semantically invalid (e.g., field validation
        failure)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Operation:
      type: object
      description: "AEP-136 Long-Running Operation. Returned by async operations instead\
        \ of 202 Accepted.\nPoll GET {operation.name} until done is true.\nThe operation.name\
        \ is a stable resource path: /api/v1/operations/{uuid}\nNote: operation_uuid\
        \ == request_uuid. Two polling endpoints are available:\n  - GET /api/v1/operations/{uuid}\
        \ — AEP-standard thin view (done, metadata, response/error)\n  - GET /api/v1/requests/{uuid}/status\
        \ — DCM-native rich view (pipeline_stage, full status history)\nBoth endpoints\
        \ reflect the same underlying operation state.\n"
      required:
      - name
      - done
      additionalProperties: false
      properties:
        name:
          type: string
          description: Stable resource path for this operation. Poll this URL for
            status.
          example: /api/v1/operations/a1b2c3d4-e5f6-7890-abcd-ef1234567890
        done:
          type: boolean
          description: True when the operation has reached a terminal state (success
            or error)
          default: false
        metadata:
          type: object
          description: Operation-specific progress metadata
          additionalProperties: false
          properties:
            stage:
              type: string
              description: Current pipeline stage
            progress_pct:
              type: integer
              minimum: 0
              maximum: 100
            resource_uuid:
              type: string
              format: uuid
              description: UUID of the resource being created/modified (set as soon
                as assigned)
            request_uuid:
              type: string
              format: uuid
              description: The DCM request UUID. operation_uuid == request_uuid. Use
                GET /api/v1/requests/{request_uuid}/status for the full DCM-native
                pipeline view.
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        response:
          type: object
          description: Present when done is true and the operation succeeded. Contains
            the result resource.
          additionalProperties: true
        error:
          type: object
          description: Present when done is true and the operation failed.
          additionalProperties: false
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - request_id
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
              format: uuid
            rule_uuid:
              type: string
              format: uuid
              description: Present on POLICY_DENIED and GOVERNANCE_DENIED
            fields:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
    SessionTokenResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - session_uuid
      properties:
        access_token:
          type: string
        token_type:
          type: string
          const: bearer
        expires_in:
          type: integer
          description: Seconds until expiry
        session_uuid:
          type: string
          format: uuid
        refresh_token:
          type: string
    SessionSummary:
      type: object
      properties:
        session_uuid:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string
        current:
          type: boolean
    TokenIntrospection:
      type: object
      properties:
        active:
          type: boolean
        actor_uuid:
          type: string
          format: uuid
        actor_type:
          type: string
        display_name:
          type: string
        tenant_uuids:
          type: array
          items:
            type: string
            format: uuid
        roles:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
    CatalogItem:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        resource_type:
          description: Resource type — FQN string (e.g., 'Compute.VirtualMachine')
            or Registry UUID. DCM resolves either form internally.
          oneOf:
          - type: string
            pattern: ^[A-Z][a-zA-Z0-9]+\.[A-Z][a-zA-Z0-9]+$
            description: FQN form (recommended)
          - type: string
            format: uuid
            description: UUID form
        display_name:
          type: string
        description:
          type: string
        version:
          type: string
        status:
          type: string
        provider_uuid:
          type: string
          format: uuid
        field_schema:
          type: object
          description: 'JSON Schema for the request body fields. Each field includes
            a constraint block with type: range|enum|pattern|layer_reference|layer_reference_list.
            For layer_reference constraints, allowed_values is resolved at render
            time from active Reference Data Layer instances of the declared layer_type.'
        cost_estimate:
          type: object
        dependencies:
          type: array
          items:
            type: object
    CatalogItemList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogItem'
        pagination:
          type: object
    ServiceRequest:
      type: object
      required:
      - catalog_item_uuid
      - fields
      properties:
        catalog_item_uuid:
          type: string
          format: uuid
        fields:
          type: object
          description: Resource-type-specific field values
          additionalProperties: true
        group_uuid:
          type: string
          format: uuid
          description: Assign to a resource group on creation
        scheduled_at:
          type: string
          format: date-time
          description: Defer request execution to this time
        depends_on:
          type: array
          items:
            type: string
            format: uuid
          description: Request UUIDs that must complete first
        dry_run:
          type: boolean
          default: false
          description: Evaluate policy and placement without submitting
    RequestAccepted:
      type: object
      properties:
        request_uuid:
          type: string
          format: uuid
        status:
          type: string
        stream_url:
          type: string
          format: uri
    RequestStatus:
      type: object
      properties:
        request_uuid:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - ACKNOWLEDGED
          - ASSEMBLING
          - AWAITING_APPROVAL
          - APPROVED
          - DISPATCHED
          - PROVISIONING
          - COMPLETED
          - FAILED
          - CANCELLED
          - SCHEDULED
          - PENDING_DEPENDENCY
          description: "Consumer request lifecycle status. COMPLETED/FAILED/CANCELLED are terminal."
        pipeline_stage:
          type: string
        entity_uuid:
          type: string
          format: uuid
          description: Set once realization begins
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        error:
          $ref: '#/components/schemas/Error'
    RequestList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RequestStatus'
        pagination:
          type: object
    RequestGroup:
      type: object
      required:
      - requests
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/ServiceRequest'
          minItems: 1
        ordered:
          type: boolean
          default: false
          description: Execute in declared order with dependency waiting
        group_name:
          type: string
    RequestGroupAccepted:
      type: object
      properties:
        group_uuid:
          type: string
          format: uuid
        request_uuids:
          type: array
          items:
            type: string
            format: uuid
    RequestGroupStatus:
      type: object
      properties:
        group_uuid:
          type: string
          format: uuid
        status:
          type: string
        requests:
          type: array
          items:
            $ref: '#/components/schemas/RequestStatus'
    ResourceEntity:
      type: object
      description: Resource entity as returned by the Consumer API (may be field-filtered
        by governance matrix)
      properties:
        uuid:
          type: string
          format: uuid
        entity_type:
          type: string
        resource_type:
          type: string
        lifecycle_state:
          type: string
        owned_by_tenant_uuid:
          type: string
          format: uuid
        provider_uuid:
          type: string
          format: uuid
        drift_status:
          type: string
        billing_state:
          type: string
        ttl_expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        fields:
          type: object
          additionalProperties: true
          description: Resource-type-specific realized fields
        relationships:
          type: array
          items:
            type: object
    ResourceList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResourceEntity'
        pagination:
          type: object
    ResourceUpdate:
      type: object
      required:
      - fields
      properties:
        fields:
          type: object
          additionalProperties: true
          description: Editable fields and their new values (delta only)
        reason:
          type: string
    RehydrateRequest:
      type: object
      properties:
        target_provider_uuid:
          type: string
          format: uuid
        reason:
          type: string
    DriftRecord:
      type: object
      properties:
        drift_uuid:
          type: string
          format: uuid
        entity_uuid:
          type: string
          format: uuid
        detected_at:
          type: string
          format: date-time
        severity:
          type: string
          enum:
          - minor
          - significant
          - critical
        unsanctioned:
          type: boolean
        status:
          type: string
          enum:
          - open
          - acknowledged
          - resolved
          - escalated
        field_differences:
          type: array
          items:
            type: object
    DriftRecordList:
